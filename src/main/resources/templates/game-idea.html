
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Game Review</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f0f1a;
            color: #e8e8f0;
            min-height: 100vh;
        }

        /* TOP NAV */
        .topnav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 32px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(8px);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            font-size: 1.15rem;
            letter-spacing: -0.3px;
            color: #fff;
        }

        .logo-icon {
            width: 32px; height: 32px;
            background: linear-gradient(135deg, #e0436d, #9b3ae8);
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #e0436d, #c02d58);
            border: none;
            color: #fff;
            padding: 9px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.2px;
            transition: opacity 0.2s, transform 0.1s;
            display: flex; align-items: center; gap: 6px;
        }

        .btn-primary:hover { opacity: 0.88; }
        .btn-primary:active { transform: scale(0.97); }

        /* PAGE */
        .page { max-width: 760px; margin: 0 auto; padding: 40px 24px 64px; }

        /* SECTION TITLE */
        .section-label {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1.2px;
            text-transform: uppercase;
            color: #8888aa;
            margin-bottom: 14px;
        }

        /* GAME LIST */
        .game-list {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 40px;
        }

        .game-list-header {
            padding: 16px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .game-list-header span {
            font-size: 14px;
            font-weight: 600;
            color: #fff;
        }

        .empty-state {
            padding: 32px 20px;
            text-align: center;
            color: #666;
            font-size: 14px;
        }

        .game-item {
            display: flex;
            align-items: center;
            padding: 14px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            transition: background 0.15s;
            list-style: none;
        }

        .game-item:last-child { border-bottom: none; }
        .game-item:hover { background: rgba(255,255,255,0.03); }

        .game-icon {
            width: 36px; height: 36px;
            border-radius: 8px;
            background: linear-gradient(135deg, #2d2d55, #1e1e3a);
            border: 1px solid rgba(255,255,255,0.1);
            display: flex; align-items: center; justify-content: center;
            font-size: 16px;
            margin-right: 14px;
            flex-shrink: 0;
        }

        .game-info { flex: 1; }
        .game-name { font-size: 14px; font-weight: 600; color: #f0f0f8; }
        .game-meta { font-size: 12px; color: #7777aa; margin-top: 2px; }

        .badge {
            font-size: 11px;
            font-weight: 600;
            padding: 3px 9px;
            border-radius: 20px;
            background: rgba(158,107,234,0.15);
            color: #b88af0;
            border: 1px solid rgba(158,107,234,0.25);
            margin-right: 8px;
        }

        .btn-delete {
            background: none;
            border: none;
            color: #555577;
            cursor: pointer;
            font-size: 16px;
            padding: 4px 6px;
            border-radius: 6px;
            transition: color 0.2s, background 0.2s;
            line-height: 1;
        }
        .btn-delete:hover { color: #e0436d; background: rgba(224,67,109,0.1); }

        /* AI SECTION */
        .ai-card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            overflow: hidden;
        }

        .ai-card-header {
            padding: 16px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .ai-card-header span {
            font-size: 14px;
            font-weight: 600;
            color: #fff;
        }

        .btn-generate {
            background: linear-gradient(135deg, #7b3fe8, #5c2ab0);
            border: none;
            color: #fff;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            display: flex; align-items: center; gap: 6px;
            transition: opacity 0.2s;
        }
        .btn-generate:hover { opacity: 0.85; }

        #indicacao {
            padding: 20px;
            font-size: 14px;
            line-height: 1.7;
            color: #aaaacc;
            min-height: 80px;
        }

        #indicacao .game-title {
            font-size: 13px;
            font-weight: 700;
            color: #c97bf5;
            letter-spacing: 0.3px;
            margin: 16px 0 6px;
            display: block;
            text-transform: uppercase;
            font-size: 11px;
        }

        #indicacao ul {
            padding-left: 18px;
            margin: 0 0 10px;
        }

        #indicacao li {
            margin-bottom: 6px;
            color: #cccce0;
        }

        #indicacao p { margin-bottom: 10px; }

        /* MODAL OVERLAY — layout-contributing faux viewport */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.65);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.open { display: flex; }

        .modal-box {
            background: #1a1a2e;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 14px;
            padding: 28px;
            width: 90%;
            max-width: 400px;
            position: relative;
        }

        .modal-box h2 {
            font-size: 1.1rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 20px;
        }

        .form-group { margin-bottom: 16px; }
        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #8888aa;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            margin-bottom: 6px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 8px;
            color: #e8e8f0;
            padding: 10px 12px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
            appearance: none;
        }

        .form-group input:focus,
        .form-group select:focus {
            border-color: rgba(158,107,234,0.6);
        }

        .form-group select option { background: #1a1a2e; }

        .modal-submit {
            width: 100%;
            padding: 11px;
            background: linear-gradient(135deg, #e0436d, #c02d58);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 4px;
            transition: opacity 0.2s;
        }
        .modal-submit:hover { opacity: 0.88; }

        .close-btn {
            position: absolute;
            top: 16px; right: 18px;
            background: none;
            border: none;
            color: #666688;
            font-size: 20px;
            cursor: pointer;
            line-height: 1;
            transition: color 0.2s;
        }
        .close-btn:hover { color: #ccc; }

        .spinner {
            display: inline-block;
            width: 12px; height: 12px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin-right: 4px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<!-- NAV -->
<nav class="topnav">
    <div class="logo">
        <div class="logo-icon">🎮</div>
        Game Idea AI
    </div>
    <button class="btn-primary" onclick="abrirModal()">
        ＋ Criar Jogo
    </button>
</nav>

<!-- MODAL -->
<div class="modal-overlay" id="modalCriar" onclick="handleOverlayClick(event)">
    <div class="modal-box">
        <button class="close-btn" onclick="fecharModal()" aria-label="Fechar">✕</button>
        <h2>Novo Jogo</h2>
        <form th:action="@{/ui/salvar}" method="post" th:object="${gameIdeaModel}">
            <div class="form-group">
                <label>Nome</label>
                <input type="text" th:field="*{nome}" placeholder="Ex: Hollow Knight" required />
            </div>
            <div class="form-group">
                <label>Gênero</label>
                <input type="text" th:field="*{genero}" placeholder="Ex: RPG, Plataforma..." required />
            </div>
            <div class="form-group">
                <label>Plataforma</label>
                <select th:field="*{plataformaDigital}" required>
                    <option value="">Selecione a plataforma</option>
                    <option th:each="p : ${T(com.gamereview.GameReview.complements.PlataformaDigital).values()}"
                            th:value="${p}" th:text="${p}"></option>
                </select>
            </div>
            <button type="submit" class="modal-submit">Salvar Jogo</button>
        </form>
    </div>
</div>

<!-- PAGE CONTENT -->
<div class="page">

    <!-- LISTA -->
    <p class="section-label">Biblioteca</p>
    <div class="game-list">
        <div class="game-list-header">
            <span>Jogos Cadastrados</span>
        </div>
        <div th:if="${#lists.isEmpty(listaJogos)}" class="empty-state">
            Nenhum jogo cadastrado ainda. Adicione o primeiro! 🎮
        </div>
        <ul style="list-style:none; padding:0; margin:0;">
            <li class="game-item" th:each="jogo : ${listaJogos}">
                <div class="game-icon">🕹</div>
                <div class="game-info">
                    <div class="game-name" th:text="${jogo.nome}"></div>
                    <div class="game-meta">
                        <span class="badge" th:text="${jogo.genero}"></span>
                        <span th:text="${jogo.plataformaDigital}"></span>
                    </div>
                </div>
                <a th:href="@{'/ui/deletar/' + ${jogo.id}}" class="btn-delete" title="Remover">🗑</a>
            </li>
        </ul>
    </div>

    <!-- AI SUGESTÃO -->
    <p class="section-label">Inteligência Artificial</p>
    <div class="ai-card">
        <div class="ai-card-header">
            <span>Gerar Indicação de Jogo</span>
            <button class="btn-generate" onclick="gerarIndicacao()" id="btn-gerar">
                ✦ Gerar
            </button>
        </div>
        <div id="indicacao">
            <p style="color:#555577;">Clique em "Gerar" para receber uma sugestão personalizada com IA.</p>
        </div>
    </div>

</div>

<script>
    function abrirModal() {
        document.getElementById('modalCriar').classList.add('open');
    }

    function fecharModal() {
        document.getElementById('modalCriar').classList.remove('open');
    }

    function handleOverlayClick(e) {
        if (e.target === document.getElementById('modalCriar')) fecharModal();
    }

    function gerarIndicacao() {
        const btn = document.getElementById('btn-gerar');
        btn.innerHTML = '<span class="spinner"></span> Gerando...';
        btn.disabled = true;

        fetch('/indicacaojogo')
            .then(r => r.text())
            .then(data => {
                processarIndicacao(data);
            })
            .catch(() => {
                document.getElementById('indicacao').innerHTML = '<p style="color:#e0436d;">Erro ao gerar indicação. Tente novamente.</p>';
            })
            .finally(() => {
                btn.innerHTML = '✦ Gerar';
                btn.disabled = false;
            });
    }

    function processarIndicacao(text) {
        const indicacaoDiv = document.getElementById('indicacao');
        const lines = text.split('\n').map(l => l.trim()).filter(l => l !== '');
        let html = '';
        let inList = false;

        lines.forEach(line => {
            if (line.startsWith('(h2)')) {
                if (inList) { html += '</ul>'; inList = false; }
                const title = line.replace('(h2)', '').replace(/:$/, '').trim();
                html += `<span class="game-title">${title}</span>`;
            } else if (line.startsWith('* ')) {
                if (!inList) { html += '<ul>'; inList = true; }
                let item = line.substring(2);
                item = item.replace(/^([^:]+):/, '<strong>$1:</strong>');
                item = item.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
                html += `<li>${item}</li>`;
            } else {
                if (inList) { html += '</ul>'; inList = false; }
                const paragraph = line.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
                html += `<p>${paragraph}</p>`;
            }
        });

        if (inList) html += '</ul>';
        indicacaoDiv.innerHTML = html;
    }
</script>
</body>
</html>
